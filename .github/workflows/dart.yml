name: Flutter Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Android Release
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Android APK
        run: flutter build apk --release
        env:
          ANDROID_KEYSTORE_PATH: "release.keystore"
          ANDROID_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # - name: 构建 Android App Bundle
      #   run: flutter build appbundle --release

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: flutter-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      # - name: 上传 AAB 产物
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: flutter-android-aab
      #     path: build/app/outputs/bundle/release/app-release.aab
      #     retention-days: 7
