name: Flutter Android Build & Auto Release

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Auto Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build APK
        run: flutter build apk --split-debug-info --obfuscate --split-per-abi --release
        env:
          ANDROID_KEYSTORE_PATH: "release.keystore"
          ANDROID_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Version Check & Generate Changelog
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          PUB_VER=$(grep "^version:" pubspec.yaml | sed 's/version://' | tr -d ' "' | cut -d'+' -f1 | tr -d '\r')
          COMMIT_SHORT=$(git rev-parse --short HEAD | tr -d '\r')
          
          LATEST_TAG=$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          CLEAN_LATEST=$(echo "${LATEST_TAG#v}" | tr -d '\r')

          CHANGELOG="自动构建产物"
          IS_PRERELEASE=true
          
          if [ "$PUB_VER" == "$CLEAN_LATEST" ]; then
            NEW_TAG="pre-${PUB_VER}-${COMMIT_SHORT}"
            TITLE="Pre-release ${PUB_VER} (${COMMIT_SHORT})"
          else
            NEW_TAG="v${PUB_VER}"
            TITLE="Release v${PUB_VER}"
            IS_PRERELEASE=false
            
            if [ -n "$LATEST_TAG" ]; then
              LOGS=$(git log "$LATEST_TAG..HEAD" --oneline | grep -E "^[a-f0-9]+ (feat|fix|ui):" || echo "无特定变更记录")
            else
              LOGS=$(git log --oneline | grep -E "^[a-f0-9]+ (feat|fix|ui):" || echo "首次发布")
            fi
            CHANGELOG="### 🚀 更新内容"$'\n'"$LOGS"
          fi

          # 写入单行输出
          echo "tag_name=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "mode_title=$TITLE" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

          # --- 核心修复：多行输出处理 ---
          {
            echo "changelog<<EOF"
            echo -e "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.mode_title }}
          prerelease: ${{ steps.meta.outputs.is_prerelease == 'true' }}
          body: |
            ${{ steps.meta.outputs.changelog }}
            
            ---
            **Build Info**: `${{ github.sha }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}